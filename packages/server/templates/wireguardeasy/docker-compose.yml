services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:latest
    restart: unless-stopped
    network_mode: bridge
    environment:
      PASSWORD: {{PASSWORD}}
      WG_HOST: casaos.local
      WG_PORT: "51820"
      WG_DEFAULT_DNS: 1.1.1.1
    ports:
      - target: 51820
        published: "{{WEB_PORT}}"
        protocol: udp
      - target: 51821
        published: "{{PORT_WG_EASY_51821}}"
        protocol: tcp
    volumes:
      - type: bind
        source: "{{VOLUME_WG_EASY__ETC_WIREGUARD}}"
        target: /etc/wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
