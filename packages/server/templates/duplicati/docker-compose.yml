services:
  duplicati:
    environment:
      PGID: "1000"
      PUID: "1000"
      TZ: Europe/London
    image: linuxserver/duplicati:latest
    deploy:
      resources:
        reservations:
          memory: 64M
    network_mode: bridge
    ports:
      - target: 8200
        published: "{{WEB_PORT}}"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: "{{VOLUME_DUPLICATI__CONFIG}}"
        target: /config
      - type: bind
        source: "{{VOLUME_DUPLICATI__BACKUPS}}"
        target: /backups
      - type: bind
        source: "{{VOLUME_DUPLICATI__SOURCE}}"
        target: /source
