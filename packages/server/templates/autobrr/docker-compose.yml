services:
  autobrr:
    image: ghcr.io/autobrr/autobrr:latest
    network_mode: bridge
    restart: unless-stopped
    environment:
      TZ: "{{TZ}}"
    ports:
      - target: 7474
        published: "{{WEB_PORT}}"
        protocol: tcp
    volumes:
      - type: bind
        source: "{{VOLUME_AUTOBRR__CONFIG}}"
        target: /config
