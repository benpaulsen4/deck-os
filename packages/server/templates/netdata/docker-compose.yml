services:
  netdata:
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    deploy:
      resources:
        limits:
          memory: 1794M
    image: netdata/netdata:latest
    pid: host
    ports:
      - target: 19999
        published: "{{WEB_PORT}}"
        protocol: tcp
    restart: unless-stopped
    security_opt:
      - apparmor:unconfined
    volumes:
      - type: bind
        source: "{{VOLUME_NETDATA__ETC_NETDATA}}"
        target: /etc/netdata
      - type: bind
        source: "{{VOLUME_NETDATA__VAR_LIB_NETDATA}}"
        target: /var/lib/netdata
      - type: bind
        source: "{{VOLUME_NETDATA__VAR_CACHE_NETDATA}}"
        target: /var/cache/netdata
      - type: bind
        source: /etc/passwd
        target: /host/etc/passwd
      - type: bind
        source: /etc/group
        target: /host/etc/group
      - type: bind
        source: /proc
        target: /host/proc
      - type: bind
        source: /sys
        target: /host/sys
      - type: bind
        source: /etc/os-release
        target: /host/etc/os-release
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
    network_mode: bridge
    privileged: false
