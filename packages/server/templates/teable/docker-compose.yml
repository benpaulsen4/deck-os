services:
  teable:
    image: teableio/teable:latest
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          memory: 512M
    ports:
      - target: 3000
        published: "{{WEB_PORT}}"
        protocol: tcp
    volumes:
      - type: bind
        source: "{{VOLUME_TEABLE__APP__ASSETS}}"
        target: /app/.assets
    environment:
      - TZ=$TZ
      - NEXT_ENV_IMAGES_ALL_REMOTE=true
      - PUBLIC_ORIGIN=http://127.0.0.1:3000
      - PRISMA_DATABASE_URL=postgresql://example:{{POSTGRES_PASSWORD}}@teable-db:5432/teable-db
      - BACKEND_CACHE_PROVIDER=redis
      - BACKEND_CACHE_REDIS_URI=redis://default:{{REDIS_PASSWORD}}@teable-cache:6379/0
    networks:
      - teable-network
    depends_on:
      teable-db:
        condition: service_healthy
      teable-cache:
        condition: service_healthy
  teable-db:
    image: postgres:latest
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          memory: 256M
    volumes:
      - type: bind
        source: "{{VOLUME_TEABLE_DB__VAR_LIB_POSTGRESQL_DATA}}"
        target: /var/lib/postgresql/data
    environment:
      - TZ=$TZ
      - POSTGRES_DB=teable-db
      - POSTGRES_USER=example
      - POSTGRES_PASSWORD={{POSTGRES_PASSWORD}}
    networks:
      - teable-network
    healthcheck:
      test:
        - CMD-SHELL
        - sh -c 'pg_isready -U example -d teable-db'
      interval: 10s
      timeout: 3s
      retries: 3
  teable-cache:
    image: redis:latest
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          memory: 256M
    expose:
      - "6379"
    volumes:
      - type: bind
        source: "{{VOLUME_TEABLE_CACHE__DATA}}"
        target: /data
    networks:
      - teable-network
    command:
      - redis-server
      - --requirepass {{REDIS_PASSWORD}}
    healthcheck:
      test:
        - CMD
        - redis-cli
        - --raw
        - incr
        - ping
      interval: 10s
      timeout: 3s
      retries: 3
networks:
  teable-network:
    name: teable-network
    driver: bridge
