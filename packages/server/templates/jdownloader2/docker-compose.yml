services:
  jdownloader2:
    image: jlesage/jdownloader-2:latest
    restart: unless-stopped
    environment:
      - USER_ID=$PUID
      - GROUP_ID=$PGID
      - TZ=$TZ
      - MYJDOWNLOADER_EMAIL=$MYJDOWNLOADER_EMAIL
      - MYJDOWNLOADER_PASSWORD=$MYJDOWNLOADER_PASSWORD
      - MYJDOWNLOADER_DEVICE_NAME=$MYJDOWNLOADER_DEVICE_NAME
      - JDOWNLOADER_HEADLESS=$JDOWNLOADER_HEADLESS
    ports:
      - target: 5800
        published: "{{WEB_PORT}}"
        protocol: tcp
      - target: 5900
        published: "{{PORT_JDOWNLOADER2_5900}}"
        protocol: tcp
      - target: 3129
        published: "{{PORT_JDOWNLOADER2_3129}}"
        protocol: tcp
    volumes:
      - type: bind
        source: "{{VOLUME_JDOWNLOADER2__CONFIG}}"
        target: /config
      - type: bind
        source: "{{VOLUME_JDOWNLOADER2__OUTPUT}}"
        target: /output
