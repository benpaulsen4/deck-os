services:
  ttydbridge:
    deploy:
      resources:
        reservations:
          memory: 8M
    environment:
      - EXEC_DIR=/opt
      - PORT=2222
      - START_COMMAND=login
    image: cp0204/ttydbridge:latest
    labels:
      icon: https://cdn.jsdelivr.net/gh/IceWhaleTech/CasaOS-AppStore@main/Apps/ttydbridge/icon.png
    pid: host
    privileged: true
    restart: unless-stopped
    volumes:
      - type: bind
        source: "{{VOLUME_TTYDBRIDGE__OPT}}"
        target: /opt
        bind:
          create_host_path: true
    network_mode: bridge
