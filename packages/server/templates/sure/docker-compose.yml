services:
  sure-web:
    image: ghcr.io/we-promise/sure:latest
    volumes:
      - type: bind
        source: "{{VOLUME_SURE_WEB__RAILS_STORAGE}}"
        target: /rails/storage
    ports:
      - target: 3000
        published: "{{WEB_PORT}}"
        protocol: tcp
    restart: unless-stopped
    environment:
      POSTGRES_USER: sure_user
      POSTGRES_PASSWORD: {{POSTGRES_PASSWORD}}
      POSTGRES_DB: sure_production
      SECRET_KEY_BASE: {{SECRET_KEY_BASE}}
      SELF_HOSTED: "true"
      RAILS_FORCE_SSL: "false"
      RAILS_ASSUME_SSL: "false"
      DB_HOST: sure-db
      DB_PORT: 5432
      REDIS_URL: redis://sure-redis:6379/1
      OPENAI_ACCESS_TOKEN: ${OPENAI_ACCESS_TOKEN}
    depends_on:
      sure-db:
        condition: service_healthy
      sure-redis:
        condition: service_healthy
    networks:
      - sure_net
    deploy:
      resources:
        reservations:
          memory: 1024M
  sure-worker:
    image: ghcr.io/we-promise/sure:latest
    command:
      - bundle
      - exec
      - sidekiq
    restart: unless-stopped
    volumes:
      - type: bind
        source: "{{VOLUME_SURE_WORKER__RAILS_STORAGE}}"
        target: /rails/storage
    depends_on:
      sure-redis:
        condition: service_healthy
    environment:
      POSTGRES_USER: sure_user
      POSTGRES_PASSWORD: {{POSTGRES_PASSWORD}}
      POSTGRES_DB: sure_production
      SECRET_KEY_BASE: {{SECRET_KEY_BASE}}
      SELF_HOSTED: "true"
      RAILS_FORCE_SSL: "false"
      RAILS_ASSUME_SSL: "false"
      DB_HOST: sure-db
      DB_PORT: 5432
      REDIS_URL: redis://sure-redis:6379/1
      OPENAI_ACCESS_TOKEN: ${OPENAI_ACCESS_TOKEN}
    networks:
      - sure_net
    deploy:
      resources:
        reservations:
          memory: 1024M
  sure-db:
    image: postgres:latest
    restart: unless-stopped
    volumes:
      - type: bind
        source: "{{VOLUME_SURE_DB__VAR_LIB_POSTGRESQL_DATA}}"
        target: /var/lib/postgresql/data
    environment:
      POSTGRES_USER: sure_user
      POSTGRES_PASSWORD: {{POSTGRES_PASSWORD}}
      POSTGRES_DB: sure_production
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U sure_user -d sure_production
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sure_net
    deploy:
      resources:
        reservations:
          memory: 1024M
  sure-redis:
    image: redis:latest
    restart: unless-stopped
    volumes:
      - type: bind
        source: "{{VOLUME_SURE_REDIS__DATA}}"
        target: /data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sure_net
    deploy:
      resources:
        reservations:
          memory: 1024M
networks:
  sure_net:
    driver: bridge
