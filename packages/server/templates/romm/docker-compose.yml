services:
  romm:
    image: rommapp/romm:latest
    deploy:
      resources:
        reservations:
          memory: 512M
    networks:
      - romm-network
    restart: unless-stopped
    ports:
      - "{{WEB_PORT}}:8080"
    environment:
      - DB_HOST=romm-db
      - DB_NAME=romm
      - DB_USER=romm-user
      - DB_PASSWD=casaos
      - ROMM_AUTH_SECRET_KEY=""
      - IGDB_CLIENT_ID=""
      - IGDB_CLIENT_SECRET=""
      - SCREENSCRAPER_USER=""
      - SCREENSCRAPER_PASSWORD=""
      - STEAMGRIDDB_API_KEY=""
    volumes:
      - "{{VOLUME_ROMM__ROMM_RESOURCES}}:/romm/resources"
      - "{{VOLUME_ROMM__REDIS_DATA}}:/redis-data"
      - "{{VOLUME_ROMM__ROMM_LIBRARY}}:/romm/library"
      - "{{VOLUME_ROMM__ROMM_ASSETS}}:/romm/assets"
      - "{{VOLUME_ROMM__ROMM_CONFIG}}:/romm/config"
    depends_on:
      romm-db:
        condition: service_healthy
        restart: true
  romm-db:
    image: mariadb:latest
    restart: unless-stopped
    networks:
      - romm-network
    environment:
      - MARIADB_ROOT_PASSWORD=casaos
      - MARIADB_DATABASE=romm
      - MARIADB_USER=romm-user
      - MARIADB_PASSWORD=casaos
    volumes:
      - "{{VOLUME_ROMM_DB__VAR_LIB_MYSQL}}:/var/lib/mysql"
    healthcheck:
      test:
        - CMD
        - healthcheck.sh
        - --connect
        - --innodb_initialized
      start_period: 30s
      start_interval: 10s
      interval: 10s
      timeout: 5s
      retries: 5
networks:
  romm-network:
    driver: bridge
