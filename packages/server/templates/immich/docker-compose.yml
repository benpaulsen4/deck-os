services:
  immich-server:
    deploy:
      resources:
        reservations:
          memory: 1024M
    hostname: immich-server
    image: altran1502/immich-server:latest
    volumes:
      - "{{VOLUME_IMMICH_SERVER__USR_SRC_APP_UPLOAD}}:/usr/src/app/upload"
      - "{{VOLUME_IMMICH_SERVER__ETC_LOCALTIME}}:/etc/localtime:ro"
    environment:
      DB_DATABASE_NAME: immich
      DB_PASSWORD: "{{DB_PASSWORD}}"
      DB_USERNAME: postgres
    ports:
      - "{{WEB_PORT}}:2283"
    depends_on:
      - redis
      - database
    restart: unless-stopped
    healthcheck:
      disable: false
    networks:
      - immich
  immich-machine-learning:
    hostname: immich-machine-learning
    image: altran1502/immich-machine-learning:latest
    environment:
      DB_DATABASE_NAME: immich
      DB_PASSWORD: "{{DB_PASSWORD}}"
      DB_USERNAME: postgres
    restart: unless-stopped
    volumes:
      - "{{VOLUME_IMMICH_MACHINE_LEARNING__CACHE}}:/cache"
    healthcheck:
      disable: false
    networks:
      - immich
  redis:
    hostname: immich-redis
    image: docker.io/redis:6.2-alpine@sha256:148bb5411c184abd288d9aaed139c98123eeb8824c5d3fce03cf721db58066d8
    healthcheck:
      test: redis-cli ping || exit 1
    volumes:
      - "{{VOLUME_REDIS__DATA}}:/data"
    restart: unless-stopped
    networks:
      - immich
  database:
    hostname: immich-postgres
    image: docker.io/tensorchord/pgvecto-rs:pg14-v0.2.0@sha256:739cdd626151ff1f796dc95a6591b55a714f341c737e27f045019ceabf8e8c52
    environment:
      POSTGRES_PASSWORD: "{{DB_PASSWORD}}"
      POSTGRES_USER: postgres
      POSTGRES_DB: immich
      POSTGRES_INITDB_ARGS: --data-checksums
    volumes:
      - "{{VOLUME_DATABASE__VAR_LIB_POSTGRESQL_DATA}}:/var/lib/postgresql/data"
    healthcheck:
      test: pg_isready --dbname='immich' --username='postgres' || exit 1;
        Chksum="$$(psql --dbname='immich' --username='postgres' --tuples-only
        --no-align --command='SELECT COALESCE(SUM(checksum_failures), 0) FROM
        pg_stat_database')"; echo "checksum failure count is $$Chksum"; [
        "$$Chksum" = '0' ] || exit 1
      interval: 5m
      start_interval: 30s
      start_period: 5m
    command:
      - postgres
      - -c
      - shared_preload_libraries=vectors.so
      - -c
      - search_path="$$user", public, vectors
      - -c
      - logging_collector=on
      - -c
      - max_wal_size=2GB
      - -c
      - shared_buffers=512MB
      - -c
      - wal_compression=on
    restart: unless-stopped
    networks:
      - immich
networks:
  immich:
    name: immich
