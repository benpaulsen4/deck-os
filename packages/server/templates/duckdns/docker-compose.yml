services:
  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    network_mode: host
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - SUBDOMAINS=subdomain1,subdomain2
      - TOKEN={{TOKEN}}
      - UPDATE_IP=ipv6
      - LOG_FILE=false
    volumes:
      - "{{VOLUME_DUCKDNS__CONFIG}}:/config"
    restart: unless-stopped
