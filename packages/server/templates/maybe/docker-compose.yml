services:
  maybe-web:
    image: ghcr.io/maybe-finance/maybe:latest
    volumes:
      - type: bind
        source: "{{VOLUME_MAYBE_WEB__RAILS_STORAGE}}"
        target: /rails/storage
    ports:
      - target: 3000
        published: "{{WEB_PORT}}"
        protocol: tcp
    restart: unless-stopped
    environment:
      POSTGRES_USER: maybe_user
      POSTGRES_PASSWORD: maybe_password
      POSTGRES_DB: maybe_production
      SECRET_KEY_BASE: a7523c3d0ae56415046ad8abae168d71074a79534a7062258f8d1d51ac2f76d3c3bc86d86b6b0b307df30d9a6a90a2066a3fa9e67c5e6f374dbd7dd4e0778e13
      SELF_HOSTED: "true"
      RAILS_FORCE_SSL: "false"
      RAILS_ASSUME_SSL: "false"
      DB_HOST: maybe-db
      DB_PORT: 5432
      REDIS_URL: redis://maybe-redis:6379/1
      OPENAI_ACCESS_TOKEN: ${OPENAI_ACCESS_TOKEN}
    depends_on:
      maybe-db:
        condition: service_healthy
      maybe-redis:
        condition: service_healthy
    networks:
      - maybe_net
    deploy:
      resources:
        reservations:
          memory: 1024M
  maybe-worker:
    image: ghcr.io/maybe-finance/maybe:latest
    command:
      - bundle
      - exec
      - sidekiq
    restart: unless-stopped
    depends_on:
      maybe-redis:
        condition: service_healthy
    environment:
      POSTGRES_USER: maybe_user
      POSTGRES_PASSWORD: maybe_password
      POSTGRES_DB: maybe_production
      SECRET_KEY_BASE: a7523c3d0ae56415046ad8abae168d71074a79534a7062258f8d1d51ac2f76d3c3bc86d86b6b0b307df30d9a6a90a2066a3fa9e67c5e6f374dbd7dd4e0778e13
      SELF_HOSTED: "true"
      RAILS_FORCE_SSL: "false"
      RAILS_ASSUME_SSL: "false"
      DB_HOST: maybe-db
      DB_PORT: 5432
      REDIS_URL: redis://maybe-redis:6379/1
      OPENAI_ACCESS_TOKEN: ${OPENAI_ACCESS_TOKEN}
    networks:
      - maybe_net
    deploy:
      resources:
        reservations:
          memory: 1024M
  maybe-db:
    image: postgres:latest
    restart: unless-stopped
    volumes:
      - type: bind
        source: "{{VOLUME_MAYBE_DB__VAR_LIB_POSTGRESQL_DATA}}"
        target: /var/lib/postgresql/data
    environment:
      POSTGRES_USER: maybe_user
      POSTGRES_PASSWORD: maybe_password
      POSTGRES_DB: maybe_production
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U maybe_user -d maybe_production
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - maybe_net
    deploy:
      resources:
        reservations:
          memory: 1024M
  maybe-redis:
    image: redis:latest
    restart: unless-stopped
    volumes:
      - type: bind
        source: "{{VOLUME_MAYBE_REDIS__DATA}}"
        target: /data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - maybe_net
    deploy:
      resources:
        reservations:
          memory: 1024M
networks:
  maybe_net:
    driver: bridge
