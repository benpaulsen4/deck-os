services:
  frontend:
    image: taskingai/taskingai-console:latest
    depends_on:
      - backend-web
      - backend-api
    networks:
      - taskingai_network
  backend-inference:
    image: taskingai/taskingai-inference:latest
    environment:
      AES_ENCRYPTION_KEY: b90e4648ad699c3bdf62c0860e09eb9efc098ee75f215bf750847ae19d41e4b0
      ICON_URL_PREFIX: http://nginx:3080
      PROJECT_ID: taskingai
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8000/v1/health_check
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - taskingai_network
  backend-plugin:
    image: taskingai/taskingai-plugin:latest
    environment:
      AES_ENCRYPTION_KEY: b90e4648ad699c3bdf62c0860e09eb9efc098ee75f215bf750847ae19d41e4b0
      ICON_URL_PREFIX: http://nginx:3080
      OBJECT_STORAGE_TYPE: local
      HOST_URL: http://nginx:3080
      PATH_TO_VOLUME: /var/lib/data
      PROJECT_ID: taskingai
    volumes:
      - "{{VOLUME_BACKEND_PLUGIN__VAR_LIB_DATA}}:/var/lib/data"
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8000/v1/health_check
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - taskingai_network
  backend-api:
    image: taskingai/taskingai-server:latest
    environment:
      POSTGRES_URL: postgres://postgres:TaskingAI321@db:5432/taskingai
      REDIS_URL: redis://:TaskingAI321@cache:6379/0
      TASKINGAI_INFERENCE_URL: http://backend-inference:8000
      TASKINGAI_PLUGIN_URL: http://backend-plugin:8000
      AES_ENCRYPTION_KEY: b90e4648ad699c3bdf62c0860e09eb9efc098ee75f215bf750847ae19d41e4b0
      OBJECT_STORAGE_TYPE: local
      HOST_URL: http://nginx:3080
      PATH_TO_VOLUME: /var/lib/data
      PROJECT_ID: taskingai
    volumes:
      - "{{VOLUME_BACKEND_API__VAR_LIB_DATA}}:/var/lib/data"
    depends_on:
      - db
      - cache
      - backend-inference
      - backend-plugin
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8000/v1/health_check
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - taskingai_network
  backend-web:
    image: taskingai/taskingai-server:latest
    environment:
      POSTGRES_URL: postgres://postgres:TaskingAI321@db:5432/taskingai
      REDIS_URL: redis://:TaskingAI321@cache:6379/0
      TASKINGAI_INFERENCE_URL: http://backend-inference:8000
      TASKINGAI_PLUGIN_URL: http://backend-plugin:8000
      AES_ENCRYPTION_KEY: b90e4648ad699c3bdf62c0860e09eb9efc098ee75f215bf750847ae19d41e4b0
      JWT_SECRET_KEY: dbefe42f34473990a3fa903a6a3283acdc3a910beb1ae271a6463ffa5a926bfb
      PURPOSE: WEB
      DEFAULT_ADMIN_USERNAME: admin
      DEFAULT_ADMIN_PASSWORD: TaskingAI321
      OBJECT_STORAGE_TYPE: local
      HOST_URL: http://nginx:3080
      PATH_TO_VOLUME: /var/lib/data
      PROJECT_ID: taskingai
    volumes:
      - "{{VOLUME_BACKEND_WEB__VAR_LIB_DATA}}:/var/lib/data"
    depends_on:
      - db
      - cache
      - backend-inference
      - backend-plugin
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8000/v1/health_check
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - taskingai_network
  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_DB: taskingai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: TaskingAI321
    volumes:
      - "{{VOLUME_DB__VAR_LIB_POSTGRESQL_DATA}}:/var/lib/postgresql/data"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always
    networks:
      - taskingai_network
  cache:
    image: redis:latest
    command:
      - redis-server
      - --requirepass
      - TaskingAI321
    volumes:
      - "{{VOLUME_CACHE__DATA}}:/data"
    healthcheck:
      test:
        - CMD
        - redis-cli
        - auth
        - TaskingAI321
        - ping
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always
    networks:
      - taskingai_network
  nginx:
    image: nginx:latest
    ports:
      - "{{WEB_PORT}}:80"
    volumes:
      - "{{VOLUME_NGINX__VAR_CACHE_NGINX}}:/var/cache/nginx"
    depends_on:
      - frontend
      - backend-web
      - backend-api
    networks:
      - taskingai_network
    configs:
      - source: nginx_config
        target: /etc/nginx/conf.d/default.conf
networks:
  taskingai_network:
    driver: bridge
configs:
  nginx_config:
    content: |
      server {
        listen 80;

        client_max_body_size 20M;

        location /images/providers/icons/ {
            proxy_pass http://backend-inference:8000;
        }

        location /images/plugins/bundles/icons/ {
            proxy_pass http://backend-plugin:8000;
        }

        location /api/v1/ {
            proxy_pass http://backend-web:8000;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 24h;
        }

        location /v1/ {
            proxy_pass http://backend-api:8000;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 24h;
        }

        location /imgs/ {
            proxy_pass http://backend-web:8000;
        }

        location / {
            proxy_pass http://frontend:80;
        }
      }
