name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Verify tag matches package.json
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG_NAME="${{ inputs.tag || github.ref_name }}"
          TAG="${TAG_NAME#v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "package.json version ($VERSION) does not match tag ($TAG_NAME)"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Prune to production dependencies
        run: pnpm prune --prod

      - name: Package release
        run: node scripts/package-release.mjs

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          files: dist/release/*.tar.gz
